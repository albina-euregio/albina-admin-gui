<div class="btn-group flex-wrap">
  @for (v of enumValues(); track v) {
    <button
      type="reset"
      [disabled]="disabled()"
      [class]="isSelected(v) ? 'btn btn-sm btn-secondary' : 'btn btn-sm btn-outline-secondary'"
      (click)="toggleEnum(v)"
    >
      <span>{{ valueI18n().replace("#", v) | translate }}</span>
    </button>
  }
  <button
    type="reset"
    [disabled]="disabled()"
    [class]="otherSelected() ? 'btn btn-sm btn-secondary' : 'btn btn-sm btn-outline-secondary'"
    (click)="selectOther()"
  >
    <span>{{ valueI18n().replace("#", "Other") | translate }}</span>
  </button>
</div>

@if (otherSelected()) {
  <input
    type="text"
    class="mt-2"
    [class]="cssClasses()"
    [disabled]="disabled()"
    [ngModel]="customText()"
    (ngModelChange)="setCustomText($event)"
  />
  @if (prettyError(); as error) {
    <div class="invalid-feedback">{{ error }}</div>
  }
}
