<div class="row g-3 mt-2">
  <div class="col-12 col-md-8">
    <label for="photoURL"><i class="ph ph-link"></i> {{ "bulletins.create.photos.url" | translate }}</label>
    <input
      id="photoURL"
      type="url"
      required
      class="form-control"
      [(ngModel)]="photo().url"
      (change)="changeAvalanchePhotoDetailEvent.emit()"
      [class.is-invalid]="isPhotoUrlInvalid()"
      [disabled]="disabled()"
    />
  </div>
  <div class="col-12 col-md-4">
    <label for="photoCopyright">
      <i class="ph ph-copyright"></i> {{ "bulletins.create.photos.copyright" | translate }}
    </label>
    <input
      id="photoCopyright"
      type="text"
      class="form-control"
      [(ngModel)]="photo().copyright"
      (change)="changeAvalanchePhotoDetailEvent.emit()"
      [disabled]="disabled()"
    />
  </div>
  <div class="col-12 col-md-4">
    <label for="photoMicroregion">
      <i class="ph ph-map-trifold"></i> {{ "bulletins.create.photos.microregion" | translate }}
    </label>
    <select
      id="photoMicroregion"
      class="form-select"
      [(ngModel)]="photo().microRegionId"
      (change)="changeAvalanchePhotoDetailEvent.emit()"
      [disabled]="disabled()"
    >
      <option [ngValue]="undefined"></option>
      @for (region of bulletin().getAllRegions(); track region) {
        <option [value]="region">{{ regionsService.getRegionName(region) }}</option>
      }
    </select>
  </div>
  <div class="col-12 col-md-4">
    <label for="photoLocation">
      <i class="ph ph-map-pin"></i> {{ "bulletins.create.photos.locationName" | translate }}
    </label>
    <input
      id="photoLocation"
      type="text"
      class="form-control"
      [(ngModel)]="photo().locationName"
      (change)="changeAvalanchePhotoDetailEvent.emit()"
      [disabled]="disabled()"
    />
  </div>
  <div class="col-12 col-md-4">
    <label for="photoDate"><i class="ph ph-calendar"></i> {{ "bulletins.create.photos.date" | translate }}</label>
    <input
      id="photoDate"
      type="date"
      class="form-control"
      [(ngModel)]="photo().date"
      (change)="changeAvalanchePhotoDetailEvent.emit()"
      [disabled]="disabled()"
    />
  </div>
</div>
