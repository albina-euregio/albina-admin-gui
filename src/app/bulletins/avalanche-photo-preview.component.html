<div class="avalanche-photo-preview">
  <a [href]="photo().url" target="_blank" rel="noopener" class="text-truncate flex-grow-1 font-xs">
    <i class="ph ph-image"></i> {{ photo().url }}
  </a>
  @if (photo().copyright) {
    <span class="text-secondary font-xs text-nowrap"> <i class="ph ph-copyright"></i> {{ photo().copyright }} </span>
  }
  @if (photo().microRegionId) {
    <span class="text-secondary font-xs text-nowrap">
      <i class="ph ph-map-trifold"></i> {{ regionsService.getRegionName(photo().microRegionId) }}
    </span>
  }
  @if (photo().locationName) {
    <span class="text-secondary font-xs text-nowrap"> <i class="ph ph-map-pin"></i> {{ photo().locationName }} </span>
  }
  @if (photo().date) {
    <span class="text-secondary font-xs text-nowrap"> <i class="ph ph-calendar"></i> {{ photo().date }} </span>
  }
  @if (!disabled()) {
    <button
      [disabled]="disabled()"
      type="reset"
      class="btn btn-sm btn-icon btn-bare--grey"
      (click)="deleteAvalanchePhoto($event)"
      data-toggle="tooltip"
      title="{{ 'bulletins.create.tooltip.removePhoto' | translate }}"
    >
      <i class="ph ph-trash"></i>
    </button>
  }
</div>
