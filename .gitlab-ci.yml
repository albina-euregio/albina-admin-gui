build:docker:
  extends: .envsubst
  environment:
    name: docker

build:observations-api:
  extends: .build
  script:
    - cd observations-api/
    - pnpm install --frozen-lockfile
    - pnpm build
  environment:
    name: observations-api
  artifacts:
    paths:
      - observations-api/

deploy:observations-api:
  extends: .deploy
  needs:
    - build:observations-api
  environment:
    name: observations-api
  script:
    - rsync -e 'ssh -p2201' --compress --delete --exclude=private.foto-webcam.eu.json --recursive --verbose observations-api/dist/ $SFTP_SERVER
    - ssh -p2201 $SSH_SERVER "sudo /usr/bin/systemctl restart $SYSTEMD_SERVICE"
  rules:
    - if: "$CI_COMMIT_TAG"
      when: manual
      allow_failure: true

deploy:observations-api-dev:
  extends: .deploy
  needs:
    - build:observations-api
  environment:
    name: observations-api-dev
  script:
    - rsync -e 'ssh -p2201' --compress --delete --exclude=private.foto-webcam.eu.json --recursive --verbose observations-api/dist/ $SFTP_SERVER
    - ssh -p2201 $SSH_SERVER "sudo /usr/bin/systemctl restart $SYSTEMD_SERVICE"
  rules:
    - when: manual
      allow_failure: true

.playwright:
  stage: playwright
  image: mcr.microsoft.com/playwright:v1.58.2
  cache:
    - *pnpm-cache
  artifacts:
    when: always
    paths:
      - playwright-report/
      - test-results/
    reports:
      junit: test-results/junit-results.xml
  before_script:
    - command -v pnpm || npm install --global pnpm@11.9.0
    - pnpm config set store-dir "$PNPM_STORE_DIR"
    - pnpm install --frozen-lockfile
    - export TZ="Europe/Vienna"
  script:
    - pnpm playwright test

playwright:dev:
  extends: .playwright
  environment:
    name: dev
  rules:
    - when: manual
      allow_failure: true

playwright:dev:chromium:
  extends: .playwright
  environment:
    name: dev
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - when: manual
      allow_failure: true
  script:
    - pnpm playwright test --project=chromium

playwright:localhost:
  extends: .playwright
  needs: []
  environment:
    name: localhost
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - when: manual
      allow_failure: true
  script:
    - pnpm playwright test --project=chromium # especially webkit is slow -> don't run on merge requests
